name: OWASP_OASIS_TOOL

permissions:
  contents: write
  id-token: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      run_tools:
        description: "Run scanners again?"
        type: choice
        required: true
        default: "auto"
        options:
          - auto
          - yes
          - no
      tool_pack:
        description: "Comma-separated list of tools to run (semgrep, bandit)"
        required: true
        default: "semgrep,bandit"
      selected_file:
        description: "If not running tools, choose an existing SARIF file"
        required: false
        type: string

jobs:
  triageAndRemediation:
    runs-on: ubuntu-latest
    outputs:
      run_tools: ${{ steps.validate.outputs.run_tools }}
      validated_file: ${{ steps.validate.outputs.validated_file }}
      source_branch: ${{ steps.branch.outputs.source_branch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine source branch
        id: branch
        run: |
          source_branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"

          if [[ -z "$source_branch" ]]; then
            echo "Unable to determine the source branch for this workflow run." >&2
            exit 1
          fi

          echo "source_branch=$source_branch" >> $GITHUB_OUTPUT

      - name: Find existing SARIF files
        id: find_files
        run: |
          mkdir -p scan-results
          files=$(ls -1t scan-results/*.sarif 2>/dev/null || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Validate selected file & determine run mode
        id: validate
        run: |
          files="${{ steps.find_files.outputs.files }}"
          selected="${{ github.event.inputs.selected_file }}"
          run="${{ github.event.inputs.run_tools }}"

          # If user selected a file manually, validate it
          if [[ -n "$selected" ]]; then
            if echo "$files" | grep -Fx "$selected" >/dev/null; then
              echo "validated_file=$selected" >> $GITHUB_OUTPUT
              echo "run_tools=false" >> $GITHUB_OUTPUT
              exit 0
            else
              echo "ERROR: Selected file does not exist:"
              echo "$selected"
              exit 1
            fi
          fi

          # Determine whether to run tools
          if [[ "$run" == "yes" ]]; then
            echo "run_tools=true" >> $GITHUB_OUTPUT
          elif [[ "$run" == "no" ]]; then
            echo "run_tools=false" >> $GITHUB_OUTPUT
          else
            # auto mode: run only if no files exist
            if [[ -z "$files" ]]; then
              echo "run_tools=true" >> $GITHUB_OUTPUT
            else
              echo "run_tools=false" >> $GITHUB_OUTPUT
              newest=$(echo "$files" | head -n 1)
              echo "validated_file=$newest" >> $GITHUB_OUTPUT
            fi
          fi

  buildMatrix:
    needs: triageAndRemediation
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}

    steps:
      - id: set
        run: |
          tools="${{ github.event.inputs.tool_pack }}"
          json=$(printf '%s\n' "$tools" | jq -R 'split(",")')
          echo "matrix=$json" >> $GITHUB_OUTPUT

  buildAppSecMatrix:
    needs: triageAndRemediation
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}

    steps:
      - id: set
        run: |
          if [[ "${{ needs.triageAndRemediation.outputs.run_tools }}" == "true" ]]; then
            tools="${{ github.event.inputs.tool_pack }}"
            json=$(printf '%s' "$tools" | jq -Rc 'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0)) | map({tool: ., file: "", artifact: ("sarif-" + .)})')
            echo "matrix=$json" >> $GITHUB_OUTPUT
            exit 0
          fi

          file="${{ needs.triageAndRemediation.outputs.validated_file }}"
          filename=$(basename "$file")
          tool=${filename%%-*}
          json=$(jq -nc --arg tool "$tool" --arg file "$file" '[{tool: $tool, file: $file, artifact: ""}]')
          echo "matrix=$json" >> $GITHUB_OUTPUT

  runScanners:
    needs: [triageAndRemediation, buildMatrix]
    if: needs.triageAndRemediation.outputs.run_tools == 'true'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        tool: ${{ fromJson(needs.buildMatrix.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.triageAndRemediation.outputs.source_branch }}
          fetch-depth: 0

      - name: Install tools
        run: |
          if [[ "${{ matrix.tool }}" == "semgrep" ]]; then
            pip install semgrep
          elif [[ "${{ matrix.tool }}" == "bandit" ]]; then
            pip install bandit
          fi

      - name: Run scanner
        id: scan
        run: |
          mkdir -p scan-results
          timestamp=$(date +"%Y%m%d-%H%M%S")
          outfile="scan-results/${{ matrix.tool }}-${timestamp}.sarif"

          if [[ "${{ matrix.tool }}" == "semgrep" ]]; then
            semgrep scan --config auto --sarif --output "$outfile" .
          elif [[ "${{ matrix.tool }}" == "bandit" ]]; then
            bandit -r . -f sarif -o "$outfile"
          fi

          echo "outfile=$outfile" >> $GITHUB_OUTPUT

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: sarif-${{ matrix.tool }}
          path: ${{ steps.scan.outputs.outfile }}

      - name: Create pull request for scan results
        uses: peter-evans/create-pull-request@v7
        with:
          branch: scan-results-${{ matrix.tool }}-${{ github.run_id }}-${{ github.run_attempt }}
          base: ${{ needs.triageAndRemediation.outputs.source_branch }}
          title: Add ${{ matrix.tool }} scan results
          commit-message: Add ${{ matrix.tool }} scan results
          body: |
            This PR stores the ${{ matrix.tool }} SARIF output generated by workflow run ${{ github.run_id }}.

            Base branch: `${{ needs.triageAndRemediation.outputs.source_branch }}`
            Result file: `${{ steps.scan.outputs.outfile }}`
          add-paths: |
            ${{ steps.scan.outputs.outfile }}
          delete-branch: true

  summarize:
    needs: [triageAndRemediation, runScanners]
    runs-on: ubuntu-latest
    if: needs.triageAndRemediation.outputs.run_tools == 'true'

    steps:
      - name: Download SARIF artifacts
        uses: actions/download-artifact@v4
        with:
          path: .

      - name: Summarize SARIF results
        id: summary
        run: |
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "### 🔐 Security Scan Summary" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "These SARIF files were generated automatically by the GitHub Action security workflow." >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT

          for f in sarif-*/*.sarif; do
            tool=$(basename "$f" | cut -d'-' -f1)
            count=$(jq '.runs[].results | length' "$f")
            echo "- **$tool** → $count findings" >> $GITHUB_OUTPUT
          done

          echo "" >> $GITHUB_OUTPUT
          echo "Files are stored in \`scan-results/\` and committed to this PR." >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: ${{ steps.summary.outputs.summary }}

  appsecAI:
    needs: [triageAndRemediation, runScanners, buildAppSecMatrix]
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include: ${{ fromJson(needs.buildAppSecMatrix.outputs.matrix) }}

    if: always() && needs.buildAppSecMatrix.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.triageAndRemediation.outputs.source_branch }}
          fetch-depth: 0

      - name: Download generated SARIF artifact
        if: matrix.artifact != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: .

      - name: Determine file for AppSecAI
        id: pick
        run: |
          if [[ -n "${{ matrix.artifact }}" ]]; then
            newest=$(find . -path "./sarif-*/*.sarif" -o -path "./scan-results/${{ matrix.tool }}-*.sarif" | sort | tail -n 1)

            if [[ -z "$newest" ]]; then
              echo "No SARIF file found for tool '${{ matrix.tool }}'." >&2
              exit 1
            fi

            tool="${{ matrix.tool }}"
            run_date=$(date +"%Y-%m-%d")
            remediation_branch="${tool}-${run_date}-remediation"

            echo "file=$newest" >> $GITHUB_OUTPUT
            echo "tool=$tool" >> $GITHUB_OUTPUT
            echo "remediation_branch=$remediation_branch" >> $GITHUB_OUTPUT
            exit 0
          fi

          file="${{ matrix.file }}"

          if [[ -z "$file" ]]; then
            echo "No SARIF file was selected for AppSecAI." >&2
            exit 1
          fi

          filename=$(basename "$file")
          tool=${filename%%-*}
          run_date=$(date +"%Y-%m-%d")
          remediation_branch="${tool}-${run_date}-remediation"

          echo "file=$file" >> $GITHUB_OUTPUT
          echo "tool=$tool" >> $GITHUB_OUTPUT
          echo "remediation_branch=$remediation_branch" >> $GITHUB_OUTPUT

      - name: Create remediation branch
        run: |
          git checkout -B "${{ steps.pick.outputs.remediation_branch }}" "origin/${{ needs.triageAndRemediation.outputs.source_branch }}"
          git push --force-with-lease origin "${{ steps.pick.outputs.remediation_branch }}"

      - name: AppSecAI
        uses: AppSecureAI/automation-action@v1
        with:
          file: ${{ steps.pick.outputs.file }}
        env:
          AUTO_CREATE_PRS: 'true'
